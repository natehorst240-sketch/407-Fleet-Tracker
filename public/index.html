<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bell 407 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    header { padding: 16px 24px; background: #111827; border-bottom: 1px solid #334155; }
    main { padding: 16px 24px; }
    .tabs button { margin-right: 8px; padding: 8px 12px; background:#1e293b; color:#e2e8f0; border:1px solid #475569; cursor:pointer; }
    .tabs button.active { background:#0284c7; color:#0b1120; }
    .tab { display:none; margin-top: 16px; }
    .tab.active { display:block; }
    .card { background:#111827; border:1px solid #334155; border-radius:8px; padding:12px; margin-bottom:12px; }
    table { width:100%; border-collapse: collapse; }
    th, td { border-bottom:1px solid #334155; padding:8px; text-align:left; }
    select { padding:6px; background:#1e293b; color:#e2e8f0; border:1px solid #475569; }
    .group { margin-bottom: 16px; }
    .status-immediate { background: rgba(239, 68, 68, 0.22); color: #fecaca; font-weight: 700; }
    .status-coming-soon { background: rgba(249, 115, 22, 0.22); color: #fed7aa; font-weight: 700; }
    .status-upcoming { background: rgba(250, 204, 21, 0.22); color: #fef08a; font-weight: 700; }
    .status-scheduled { background: rgba(34, 197, 94, 0.22); color: #bbf7d0; font-weight: 700; }
  </style>
</head>
<body>
<header>
  <h2>Bell 407 Fleet Dashboard</h2>
  <div id="meta"></div>
</header>
<main>
  <div class="tabs">
    <button class="active" onclick="showTab('inspections', this)">Inspections</button>
    <button onclick="showTab('components', this)">Components</button>
    <button onclick="showTab('utilization', this)">Utilization</button>
  </div>

  <section id="inspections" class="tab active">
    <div class="card">
      <label for="inspectionSelect">Months Remaining View:</label>
      <select id="inspectionSelect"></select>
    </div>
    <div class="card">
      <h3>Months Remaining by Aircraft</h3>
      <canvas id="hoursChart" height="120"></canvas>
    </div>
    <div class="card">
      <h3>Other Inspection Hours Remaining by Aircraft</h3>
      <table>
        <thead id="inspectionTableHead"></thead>
        <tbody id="inspectionTable"></tbody>
      </table>
    </div>
  </section>

  <section id="components" class="tab">
    <h3>RETIRE / OVERHAUL items due in ≤ 200 hours (grouped by aircraft)</h3>
    <div id="componentGroups"></div>
  </section>

  <section id="utilization" class="tab">
    <h3>Average Daily / Weekly Flight Hours</h3>
    <table>
      <thead><tr><th>Aircraft</th><th>Avg Daily</th><th>Avg Weekly</th><th>History Points</th></tr></thead>
      <tbody id="utilTable"></tbody>
    </table>
  </section>
</main>

<script>
let dashboard;
let chart;

function showTab(name, btn){
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
}

function round(val){ return (val === null || val === undefined || Number.isNaN(Number(val))) ? '—' : Number(val).toFixed(1); }

function getStatusForHours(hours){
  if (hours === null || hours === undefined || Number.isNaN(Number(hours))) return null;
  const value = Number(hours);
  if (value < 10) return {label: 'IMMEDIATE', className: 'status-immediate'};
  if (value < 25) return {label: 'COMING SOON', className: 'status-coming-soon'};
  if (value < 50) return {label: 'UPCOMING', className: 'status-upcoming'};
  return {label: 'SCHEDULED', className: 'status-scheduled'};
}

function populateInspectionSelector(){
  const select = document.getElementById('inspectionSelect');
  const selectableInspections = dashboard.inspection_names.filter(name => name === '12 Month' || name === '24 Month');
  selectableInspections.forEach(name => {
    const option = document.createElement('option');
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });
  select.addEventListener('change', () => renderInspection(select.value));
  if (selectableInspections.length) renderInspection(selectableInspections[0]);
  renderInspectionSummaryTable();
}

function renderInspection(name){
  const rows = [];
  dashboard.aircraft.forEach(ac => {
    const match = ac.inspections.find(i => i.inspection === name);
    if (match) rows.push({tail: ac.tail, ...match});
  });
  rows.sort((a,b) => (a.remaining_hours ?? 99999) - (b.remaining_hours ?? 99999));

  const labels = rows.map(r => r.tail);
  const months = rows.map(r => r.remaining_days === null ? null : r.remaining_days / 30.44);

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('hoursChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Remaining Months', data: months, backgroundColor: '#38bdf8' }] },
    options: { plugins: { legend: { display: false } } }
  });
}

function renderInspectionSummaryTable(){
  const excludedInspections = new Set(['12 Month', '24 Month']);
  const inspectionColumns = dashboard.inspection_names.filter(name => !excludedInspections.has(name));

  const head = document.getElementById('inspectionTableHead');
  head.innerHTML = `<tr><th>Aircraft</th>${inspectionColumns.map(name => `<th>${name}</th>`).join('')}</tr>`;

  const body = document.getElementById('inspectionTable');
  body.innerHTML = '';

  dashboard.aircraft
    .slice()
    .sort((a, b) => a.tail.localeCompare(b.tail))
    .forEach(ac => {
    const tr = document.createElement('tr');
    const cells = [`<td>${ac.tail}</td>`];

    inspectionColumns.forEach(inspectionName => {
      const match = ac.inspections.find(i => i.inspection === inspectionName);
      const status = getStatusForHours(match?.remaining_hours);
      if (!match || status === null) {
        cells.push('<td>—</td>');
      } else {
        cells.push(`<td class="${status.className}">${round(match.remaining_hours)} hrs (${status.label})</td>`);
      }
    });

    tr.innerHTML = cells.join('');
    body.appendChild(tr);
  });
}

function renderComponents(){
  const root = document.getElementById('componentGroups');
  root.innerHTML = '';
  Object.entries(dashboard.components_by_aircraft).sort(([a],[b]) => a.localeCompare(b)).forEach(([tail, items]) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'card group';
    const rows = items.map(i => `<tr><td>${i.requirement_type}</td><td>${i.ata}</td><td>${i.description}</td><td>${round(i.remaining_hours)}</td></tr>`).join('');
    wrapper.innerHTML = `<h4>${tail}</h4><table><thead><tr><th>Type</th><th>ATA</th><th>Description</th><th>Remaining Hours</th></tr></thead><tbody>${rows}</tbody></table>`;
    root.appendChild(wrapper);
  });
}

function renderUtilization(){
  const body = document.getElementById('utilTable');
  body.innerHTML = '';
  dashboard.aircraft.forEach(ac => {
    const util = ac.utilization || {};
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${ac.tail}</td><td>${round(util.avg_daily_hours)}</td><td>${round(util.avg_weekly_hours)}</td><td>${util.daily_points?.length ?? 0}</td>`;
    body.appendChild(tr);
  });
}

(async () => {
  const res = await fetch('data/dashboard.json?t=' + Date.now(), {cache: 'no-store'});
  dashboard = await res.json();
  document.getElementById('meta').textContent = `Generated ${dashboard.meta.generated_utc} | Aircraft: ${dashboard.meta.aircraft_count}`;
  populateInspectionSelector();
  renderComponents();
  renderUtilization();
})();
</script>
</body>
</html>
